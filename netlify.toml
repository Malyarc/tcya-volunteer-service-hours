# Netlify build & runtime configuration.
#
# - The frontend is a Vite build inside the `client` workspace.
# - The backend lives in `netlify/functions/api/` and is invoked via the
#   `/api/*` rewrite below. Its deps (serverless-http, @neondatabase/serverless)
#   live in the root package.json, which Netlify installs before bundling.
# - Production data is persisted to Postgres (Neon). Set DATABASE_URL (plus
#   ADMIN_PASSWORD / SESSION_SECRET) in Site configuration → Environment
#   variables. Without DATABASE_URL the function falls back to a NON-persistent
#   in-memory store, and admin is disabled unless ADMIN_PASSWORD is set.

[build]
  # Run from the repo root (the default; no `base` line needed).
  command = "cd client && npm install && npm run build"
  publish = "client/dist"

[functions]
  # Each function lives in its own subfolder so it can carry a
  # function-local package.json with its own dependencies.
  directory = "netlify/functions"
  node_bundler = "esbuild"
  # Allow the function to import from server/src (route definitions live
  # there and are shared with the EC2 entry).
  included_files = ["server/src/**"]

[[redirects]]
  # Forward /api/* to the API function while keeping the original URL
  # so Express still matches /api/... routes.
  from   = "/api/*"
  to     = "/.netlify/functions/api/:splat"
  status = 200
  force  = true

[[redirects]]
  # SPA fallback: any non-API GET serves index.html so the React router
  # can take over.
  from   = "/*"
  to     = "/index.html"
  status = 200
